name: build

on:
  push:
    branches:
      - master
  workflow_dispatch: {}
  repository_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'JekyllNet/minimal-mistakes'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Build docs with JekyllNet
      uses: JekyllNet/action@v2
      with:
        source: ./docs
        destination: ./artifacts/docs-site
        upload-artifact: "true"
        artifact-name: minimal-mistakes-docs

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./artifacts/docs-site

  deploy:
    if: github.repository == 'JekyllNet/minimal-mistakes'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
